# Apache vhost for Laravel. The literal __PORT__ token is replaced at
# container start by the entrypoint using Render's $PORT value.
# (The matching `Listen` directive is written to ports.conf by the entrypoint.)
<VirtualHost *:__PORT__>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Honor X-Forwarded-Proto from Render's TLS-terminating proxy so Laravel
    # generates https URLs.
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
